<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>구전공 급식</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f0; --card: #fff;
    --border: rgba(0,0,0,0.07); --text: #111; --muted: #999;
    --accent: #111; --accent-inv: #fff; --blue: #2563eb;
  }
  [data-dark] {
    --bg: #0f0f0e; --card: #1a1a18;
    --border: rgba(255,255,255,0.08); --text: #f0f0ee; --muted: #666;
    --accent: #f0f0ee; --accent-inv: #0f0f0e;
  }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 420px; margin: 0 auto;
    min-height: 100vh; padding-bottom: 48px;
    transition: background .25s, color .25s;
  }

  header {
    padding: 48px 22px 20px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .title-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .title-main  { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  .dark-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .nav {
    display: flex; align-items: center;
    padding: 0 22px; margin-bottom: 16px; gap: 10px;
  }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .nav-btn:active { opacity: .6; }
  .nav-center { flex: 1; }
  .nav-date { font-size: 18px; font-weight: 700; letter-spacing: -.5px; }
  .nav-day  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .today-badge {
    display: inline-block; background: var(--blue); color: #fff;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 20px; margin-left: 5px; vertical-align: middle;
  }

  .week {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 5px; padding: 0 22px; margin-bottom: 20px;
  }
  .wday {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 8px 0; text-align: center; cursor: pointer; transition: all .15s;
  }
  .wday .w { font-size: 10px; color: var(--muted); font-weight: 600; }
  .wday .d { font-size: 16px; font-weight: 700; margin-top: 3px; letter-spacing: -.5px; }
  .wday.is-today { border-color: var(--blue); }
  .wday.is-today .w, .wday.is-today .d { color: var(--blue); }
  .wday.sel { background: var(--accent); border-color: var(--accent); }
  .wday.sel .w, .wday.sel .d { color: var(--accent-inv); }

  .meals { padding: 0 22px; }
  .meal-block { margin-bottom: 14px; }
  .meal-label {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 7px; padding-left: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .meal-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  .meal-row {
    padding: 13px 18px; font-size: 15px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .meal-row:last-child { border-bottom: none; }
  .meal-row::before {
    content: ''; width: 4px; height: 4px; border-radius: 50%;
    background: var(--muted); opacity: .3; flex-shrink: 0;
  }

  .state { padding: 60px 22px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.8; }
  .state-icon { font-size: 36px; margin-bottom: 10px; }
  .spinner {
    width: 22px; height: 22px; border: 2px solid var(--border);
    border-top-color: var(--text); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; padding: 20px 22px 0; font-size: 11px; color: var(--border); }
</style>
</head>
<body>

<header>
  <div>
    <div class="title-label">구미전자공업고등학교</div>
    <div class="title-main">오늘의 급식</div>
  </div>
  <button class="dark-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
</header>

<div class="nav">
  <button class="nav-btn" onclick="move(-1)">‹</button>
  <div class="nav-center">
    <div class="nav-date" id="dateLabel"></div>
    <div class="nav-day"  id="dayLabel"></div>
  </div>
  <button class="nav-btn" onclick="move(1)">›</button>
</div>

<div class="week"  id="week"></div>
<div class="meals" id="meals"></div>
<div class="footer">나이스 공식 데이터 · 실시간 연동</div>

<script>
  const KEY   = 'db8feffd37b74ab4bc5091be259069bd';
  const OFFICE = 'E10';      // 경북교육청
  const SCHOOL = '7530047';  // 구미전자공업고등학교
  const DOW   = ['일','월','화','수','목','금','토'];
  const ICONS = {'1':'🌅','2':'☀️','3':'🌆'};
  const NAMES = {'1':'조식','2':'중식','3':'석식'};

  // 다크모드
  const saved = localStorage.getItem('dk');
  if (saved==='1' || (!saved && matchMedia('(prefers-color-scheme:dark)').matches)) setDark(true);
  function setDark(v) {
    v ? document.body.setAttribute('data-dark','') : document.body.removeAttribute('data-dark');
    document.getElementById('darkBtn').textContent = v ? '☀️' : '🌙';
  }
  function toggleDark() {
    const on = document.body.hasAttribute('data-dark');
    setDark(!on); localStorage.setItem('dk', on?'0':'1');
  }

  // 날짜
  let cur = new Date();
  const cache = {};
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate());
  const isToday = d => fmt(d) === fmt(new Date());
  const sameDay = (a,b) => fmt(a) === fmt(b);

  function renderHeader() {
    document.getElementById('dateLabel').innerHTML =
      cur.getFullYear()+'년 '+(cur.getMonth()+1)+'월 '+cur.getDate()+'일' +
      (isToday(cur) ? '<span class="today-badge">오늘</span>' : '');
    document.getElementById('dayLabel').textContent = DOW[cur.getDay()]+'요일';
  }

  function renderWeek() {
    const dow = cur.getDay();
    const mon = new Date(cur);
    mon.setDate(cur.getDate() - (dow===0 ? 6 : dow-1));
    const el = document.getElementById('week');
    el.innerHTML = '';
    for (let i=0; i<5; i++) {
      const d = new Date(mon); d.setDate(mon.getDate()+i);
      const div = document.createElement('div');
      div.className = 'wday' + (isToday(d)?' is-today':'') + (sameDay(d,cur)?' sel':'');
      div.innerHTML = `<div class="w">${DOW[d.getDay()]}</div><div class="d">${d.getDate()}</div>`;
      div.onclick = () => { cur=d; renderHeader(); renderWeek(); load(); };
      el.appendChild(div);
    }
  }

  window.move = n => {
    cur = new Date(cur); cur.setDate(cur.getDate()+n);
    renderHeader(); renderWeek(); load();
  };

  async function load() {
    const key = fmt(cur);
    const el  = document.getElementById('meals');
    if (cache[key]) { render(cache[key]); return; }

    el.innerHTML = `<div class="state"><div class="spinner"></div>불러오는 중...</div>`;

    try {
      const url =
        'https://open.neis.go.kr/hub/mealServiceDietInfo' +
        '?KEY='                + KEY +
        '&Type=json&pIndex=1&pSize=10' +
        '&ATPT_OFCDC_SC_CODE=' + OFFICE +
        '&SD_SCHUL_CODE='      + SCHOOL +
        '&MLSV_YMD='           + key;

      console.log('급식 요청:', url);
      const res  = await fetch(url);
      const text = await res.text();
      console.log('급식 응답:', text.slice(0, 300));
      const data = JSON.parse(text);

      if (data.mealServiceDietInfo) {
        cache[key] = data.mealServiceDietInfo[1].row;
        render(cache[key]);
      } else if (data.RESULT?.CODE === 'INFO-200') {
        el.innerHTML = `<div class="state"><div class="state-icon">🍽️</div>급식 정보가 없어요<br><span style="font-size:12px">주말이거나 방학일 수 있어요</span></div>`;
      } else {
        el.innerHTML = `<div class="state"><div class="state-icon">⚠️</div>${data.RESULT?.MESSAGE || '알 수 없는 오류'}<br><span style="font-size:11px;opacity:.6">${text.slice(0,80)}</span></div>`;
      }
    } catch(e) {
      el.innerHTML = `<div class="state"><div class="state-icon">😵</div>불러오기 실패<br><span style="font-size:12px">${e.message}</span></div>`;
    }
  }

  function render(rows) {
    document.getElementById('meals').innerHTML = rows.map(row => {
      const code  = row.MMEAL_SC_CODE;
      const items = row.DDISH_NM
        .replace(/<br\/>/g,'\n').replace(/<br>/g,'\n')
        .split('\n')
        .map(s => s.replace(/\([\d.]+\)/g,'').trim())
        .filter(Boolean);
      return `
        <div class="meal-block">
          <div class="meal-label">${ICONS[code]||'🍽️'} ${NAMES[code]||row.MMEAL_SC_NM}</div>
          <div class="meal-card">
            ${items.map(i=>`<div class="meal-row">${i}</div>`).join('')}
          </div>
        </div>`;
    }).join('');
  }

  renderHeader(); renderWeek(); load();
</script>
</body>
</html>
